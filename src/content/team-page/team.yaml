hero:
  badge: We're a team of 9 (plus one little bird)
  title: The humans behind your {gentlest} habit.
  body: We're a tiny, remote-first team obsessed with one idea — that progress should feel kind. Here's who's sweating the small stuff.

values:
  - title: Kind by default
    body: Every decision starts with "is this gentle?" — for our users and for each other.
    icon: "🕊"
  - title: Start tiny
    body: We ship small, learn fast, and let good things compound — the same way habits do.
    icon: "🌱"
    iconBg: "#e7f5ec"
  - title: Answer every human
    body: Real replies from real people. No bots, no canned scripts, no ticket numbers.
    icon: "✉"
    iconBg: "#e9ecff"

