features:
  header:
    eyebrow: Why it sticks
    title: Everything you need to actually keep going.
  items:
    - title: Streaks that forgive you
      body: Miss a day? Pip gives you a grace token instead of resetting to zero. Progress should feel kind, not punishing.
      icon: "🔄"
      colSpan: 2
      tone: white
      illustration: bars
    - title: Meet Pip, your buddy
      body: A friendly little companion that cheers you on, celebrates the small wins, and keeps you company on the slow days.
      icon: "✦"
      rowSpan: 2
      tone: accent
      illustration: mascot
    - title: Gentle nudges
      body: Reminders that arrive when you're most likely to say yes — not a barrage of alarms.
      icon: "🔔"
      tone: white
      illustration: nudge
    - title: See your growth
      body: Warm, readable charts that show how far you've come — without the doom-scroll of numbers.
      icon: "🌱"
      tone: white
      illustration: growth
    - title: Routines, not to-do lists
      body: Group habits into morning, focus, and wind-down flows. Pip walks you through each, one gentle step at a time.
      icon: "🗂"
      colSpan: 2
      tone: cream
      illustration: routines
      items:
        - 🌅 Morning flow
        - ✎ Focus block
        - 🌙 Wind down

how:
  header:
    eyebrow: Three tiny steps
    title: Start in about a minute.
  steps:
    - number: 1
      title: Pick one tiny habit
      body: Choose from 200+ starter habits or write your own. Start absurdly small — that's the trick.
    - number: 2
      title: Get a gentle nudge
      body: Pip learns your rhythm and pings you at the moment you're most likely to follow through.
    - number: 3
      title: Watch it grow
      body: Check in, keep your streak, and let small wins stack into a routine you're proud of.

