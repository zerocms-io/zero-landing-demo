faq:
  header:
    eyebrow: Good questions
    title: Before you ask.
  items:
    - question: Is Pip really free?
      answer: Yes. The free plan covers unlimited habits, streaks, and nudges forever. Pip Plus adds routines, deeper insights, and cloud sync across devices for the price of a coffee a month.
      defaultOpen: true
    - question: What happens if I miss a day?
      answer: Nothing scary. Pip hands you a grace token so your streak stays intact. Life happens — your progress shouldn't vanish because of one busy Tuesday.
    - question: Which devices does it work on?
      answer: Pip runs on iOS and Android, with a lightweight web dashboard for checking in from your laptop. Everything syncs the moment you're back online.
    - question: Is my data private?
      answer: Always. Your habits are yours. We never sell your data, and you can export or delete everything in two taps, no questions asked.

